@keyframes donorRiseHigh{0%{opacity:0;transform:translateY(0) translateX(0);}10%{opacity:.45;}75%{opacity:.25;transform:translateY(-80vh) translateX(4px);}100%{opacity:0;transform:translateY(-110vh) translateX(7px);}}

.donation-name-input{width:100%;font-family:'Courier New',monospace;font-size:14px;padding:9px 12px;border:1px solid #6b2f2f;border-radius:2px;background:#fdf8f0;color:#3b1a1a;outline:none;margin-bottom:1rem;letter-spacing:.3px;}
.donation-name-input::placeholder{color:#6b2f2f;opacity:.45;}
.donation-actions{display:flex;gap:8px;justify-content:flex-end;}

let theme='coffee',langIdx=0,modeIdx=0,running=false,interval=null,sessions=0,darkMode=false;
let customMins=[25,5,15];
let tasks=[];
let currentTaskIdx=null;

function MS(i){return customMins[i]*60;}
function totalSecs(){return MS(modeIdx);}

function loadState(){
  try{
    const t=localStorage.getItem('bf_theme');if(t)theme=t;
    const dk=localStorage.getItem('bf_dark');if(dk)darkMode=dk==='1';
    const l=localStorage.getItem('bf_lang');if(l)langIdx=parseInt(l);
    const s=localStorage.getItem('bf_sessions');if(s)sessions=parseInt(s);
    const m=localStorage.getItem('bf_times');if(m)customMins=JSON.parse(m);
    const tk=localStorage.getItem('bf_tasks');if(tk)tasks=JSON.parse(tk);
    const ct=localStorage.getItem('bf_ctask');currentTaskIdx=ct===null?null:parseInt(ct);
    if(currentTaskIdx>=tasks.length)currentTaskIdx=null;
  }catch(e){}
}

function saveState(){
  try{
    localStorage.setItem('bf_theme',theme);
    localStorage.setItem('bf_dark',darkMode?'1':'0');
    localStorage.setItem('bf_lang',langIdx);
    localStorage.setItem('bf_sessions',sessions);
    localStorage.setItem('bf_times',JSON.stringify(customMins));
    localStorage.setItem('bf_tasks',JSON.stringify(tasks));
    localStorage.setItem('bf_ctask',currentTaskIdx===null?'':currentTaskIdx);
  }catch(e){}
}

let remaining=MS(0);

function L(){return LANGS[langIdx][theme];}
function U(){return LANGS[langIdx];}
function XU(){return EXTRA[LANGS[langIdx].code]||EXTRA.en;}
function fmt(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}
function ring(p){document.getElementById('ringFill').style.strokeDashoffset=427*(1-p);}
function liquid(p){const l=document.getElementById('liq');if(!l)return;if(theme==='coffee'){const h=76*p;l.setAttribute('height',h);l.setAttribute('y',144-h);}else{const h=48*p;l.setAttribute('height',h);l.setAttribute('y',148-h);}}

function playDone(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const t=ctx.currentTime;
    [[523.25,0],[659.25,0.18],[783.99,0.36]].forEach(([f,d])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.type='sine';o.frequency.value=f;
      g.gain.setValueAtTime(0,t+d);
      g.gain.linearRampToValueAtTime(0.22,t+d+0.02);
      g.gain.exponentialRampToValueAtTime(0.001,t+d+0.9);
      o.start(t+d);o.stop(t+d+0.95);
    });
  }catch(e){}
}

function buildSelect(){
  const s=document.getElementById('langSelect');
  s.innerHTML='';
  LANGS.forEach((l,i)=>{const o=document.createElement('option');o.value=i;o.textContent=l.label;if(i===langIdx)o.selected=true;s.appendChild(o);});
}

function setLang(i){langIdx=parseInt(i);applyLang();saveState();}

function applyLang(){
  const l=L(),u=U();
  document.getElementById('brandName').textContent=l.brand;
  document.getElementById('lblSubtitle').textContent=l.sub;
  document.getElementById('lblCups').textContent=l.cups;
  document.getElementById('lblToday').textContent=l.today;
  [0,1,2].forEach(i=>{
    document.getElementById('tab'+i).textContent=l.tabs[i].replace(/\d+/,customMins[i]);
    const tl=document.getElementById('timeLabel'+i);if(tl)tl.textContent=l.modes[i];
    const mu=document.getElementById('timeMins'+i);if(mu)mu.textContent=u.mins;
  });
  document.getElementById('modeLabel').textContent=l.modes[modeIdx];
  document.getElementById('resetBtn').textContent=l.reset;
  document.getElementById('startBtn').textContent=running?l.pause:l.start;

  document.getElementById('taskInput').placeholder=u.addTask;
  document.getElementById('addBtn').textContent=u.add;
  document.getElementById('lblCurrentTask').textContent=XU().ct;

  document.getElementById('donateBtn').textContent=XU().donate;
  if(!running&&remaining===totalSecs())document.getElementById('timerMsg').textContent=l.ready;
  renderCurrentTask();
}

function syncTimeInputs(){
  [0,1,2].forEach(i=>{const el=document.getElementById('timeInput'+i);if(el)el.value=customMins[i];});
}

function toggleSettings(){
  const p=document.getElementById('settingsPanel');
  const b=document.getElementById('settingsBtn');
  const open=p.classList.toggle('open');
  b.classList.toggle('open',open);
}

function updateTime(i,val){
  const v=Math.max(1,Math.min(99,parseInt(val)||1));
  customMins[i]=v;
  document.getElementById('timeInput'+i).value=v;
  const tabEl=document.getElementById('tab'+i);
  if(tabEl)tabEl.textContent=tabEl.textContent.replace(/\d+/,v);
  if(modeIdx===i&&!running){
    remaining=MS(i);
    document.getElementById('timerDisplay').textContent=fmt(remaining);
    ring(0);liquid(0);
    document.getElementById('timerMsg').textContent=L().ready;
  }
  saveState();
}

function applyDark(){
  const app=document.getElementById('app');
  darkMode?app.classList.add('dark'):app.classList.remove('dark');
  document.getElementById('darkBtn').textContent=darkMode?'☀':'☾';
  const bodyBg={coffee:{light:'#f0ece4',dark:'#0f0a05'},matcha:{light:'#eef2ea',dark:'#080e08'}};
  const floatColor={coffee:{light:'#6b2f2f',dark:'#f0d4a0'},matcha:{light:'#3a5c3a',dark:'#a8e0a0'}};
  document.body.style.background=bodyBg[theme][darkMode?'dark':'light'];
  document.body.style.setProperty('--float-color',floatColor[theme][darkMode?'dark':'light']);
}

function toggleDark(){
  darkMode=!darkMode;
  applyDark();
  saveState();
}

function applyTheme(){
  const T=THEMES[theme];
  document.getElementById('ringBg').style.stroke=T.rb;
  document.getElementById('ringFill').style.stroke=T.rs;
  ['s1','s2','s3'].forEach(id=>document.getElementById(id).style.stroke=T.st);
  T.draw(document.getElementById('vesselBody'));
  const p=remaining===totalSecs()?0:1-remaining/totalSecs();
  ring(p);liquid(p);
}

function setTheme(t){
  theme=t;
  document.getElementById('app').className=t==='coffee'?'theme-coffee':'theme-matcha';
  document.getElementById('tCoffee').className='theme-opt'+(t==='coffee'?' active':'');
  document.getElementById('tMatcha').className='theme-opt'+(t==='matcha'?' active':'');
  applyDark();applyTheme();applyLang();rebuildShelf();saveState();
}

function toggleTimer(){
  if(!running){
    running=true;
    document.getElementById('startBtn').textContent=L().pause;
    interval=setInterval(()=>{
      remaining--;
      document.getElementById('timerDisplay').textContent=fmt(remaining);
      const p=1-remaining/totalSecs();
      ring(p);liquid(p);
      const m=L().msgs[modeIdx];
      document.getElementById('timerMsg').textContent=m[Math.min(Math.floor(p*m.length),m.length-1)];
      document.getElementById('steamGroup').style.opacity=p>.25?'1':'0';
      if(remaining<=0){
        clearInterval(interval);running=false;sessions++;
        document.getElementById('sessionCount').textContent=sessions;
        document.getElementById('startBtn').textContent=L().start;
        document.getElementById('timerMsg').textContent=L().done;
        addV();ring(1);liquid(1);
        document.getElementById('steamGroup').style.opacity='1';
        if(modeIdx===0&&currentTaskIdx!==null&&tasks[currentTaskIdx]){
          tasks[currentTaskIdx].completedPours=(tasks[currentTaskIdx].completedPours||0)+1;
          renderCurrentTask();renderTasks();
        }
        playDone();saveState();
      }
    },1000);
  }else{
    clearInterval(interval);running=false;
    document.getElementById('startBtn').textContent=L().start;
    document.getElementById('timerMsg').textContent=L().paused;
  }
}

function resetTimer(){
  clearInterval(interval);running=false;
  remaining=totalSecs();
  document.getElementById('timerDisplay').textContent=fmt(remaining);
  document.getElementById('startBtn').textContent=L().start;
  document.getElementById('timerMsg').textContent=L().ready;
  document.getElementById('steamGroup').style.opacity='0';
  ring(0);liquid(0);
}

function switchMode(i){
  clearInterval(interval);running=false;modeIdx=i;
  remaining=MS(i);
  [0,1,2].forEach(j=>document.getElementById('tab'+j).className='tab'+(j===i?' active':''));
  document.getElementById('timerDisplay').textContent=fmt(remaining);
  document.getElementById('modeLabel').textContent=L().modes[i];
  document.getElementById('startBtn').textContent=L().start;
  document.getElementById('timerMsg').textContent=L().ready;
  document.getElementById('steamGroup').style.opacity='0';
  ring(0);liquid(0);
}

function addV(){document.getElementById('mugsRow').insertAdjacentHTML('beforeend',THEMES[theme].full);}
function rebuildShelf(){
  const r=document.getElementById('mugsRow');
  r.innerHTML=THEMES[theme].empty;
  for(let i=0;i<sessions;i++)r.insertAdjacentHTML('beforeend',THEMES[theme].full);
}

function setCurrentTask(i){
  currentTaskIdx=currentTaskIdx===i?null:i;
  renderCurrentTask();renderTasks();saveState();
}

function renderCurrentTask(){
  const row=document.getElementById('currentTaskRow');
  if(!row)return;
  if(currentTaskIdx===null||!tasks[currentTaskIdx]){
    row.innerHTML=`<span class="current-task-name empty">${XU().nt}</span>`;
  }else{
    const t=tasks[currentTaskIdx];
    const done=t.completedPours||0;
    const total=t.pours||1;
    row.innerHTML=`<span class="current-task-name${t.done?' done':''}">${escHtml(t.text)}</span><span class="current-task-counter">${done} / ${total}</span>`;
  }
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function renderTasks(){
  const ul=document.getElementById('taskList');
  ul.innerHTML='';
  tasks.forEach((t,i)=>{
    const li=document.createElement('li');
    li.className='task-item';
    const isCurrent=currentTaskIdx===i;
    const done=t.completedPours||0;
    li.innerHTML=`<input type="checkbox" class="task-check"${t.done?' checked':''} onchange="toggleTask(${i})"><span class="task-text${t.done?' done':''}">${escHtml(t.text)}</span><span class="task-pours-badge">${done} / <input type="number" class="task-pours-edit" value="${t.pours||1}" min="1" max="99" onchange="updateTaskPours(${i},this.value)" onclick="event.stopPropagation()"></span><button class="task-set-btn${isCurrent?' active':''}" onclick="setCurrentTask(${i})" title="Set as current">▶</button><button class="task-del" onclick="deleteTask(${i})">×</button>`;
    ul.appendChild(li);
  });
}

function updateTaskPours(i,val){
  tasks[i].pours=Math.max(1,Math.min(99,parseInt(val)||1));
  renderCurrentTask();saveState();
}

function addTask(){
  const inp=document.getElementById('taskInput');
  const text=inp.value.trim();
  if(!text)return;
  const pours=Math.max(1,Math.min(99,parseInt(document.getElementById('poursInput').value)||1));
  tasks.push({text,done:false,pours,completedPours:0});
  inp.value='';
  document.getElementById('poursInput').value=1;
  renderTasks();saveState();
}

function toggleTask(i){
  tasks[i].done=!tasks[i].done;
  renderTasks();saveState();
}

function deleteTask(i){
  tasks.splice(i,1);
  if(currentTaskIdx===i)currentTaskIdx=null;
  else if(currentTaskIdx>i)currentTaskIdx--;
  renderCurrentTask();renderTasks();saveState();
}

const DUMMY_DONORS=[
  {name:'Maria G.',amount:'3.00',currency:'USD'},
  {name:'Tomás R.',amount:'5.00',currency:'USD'},
  {name:'Sarah K.',amount:'2.00',currency:'USD'},
  {name:'Li Wei',amount:'5.00',currency:'USD'},
  {name:'Alex P.',amount:'3.00',currency:'USD'}
];

function startDonorFloats(names){
  if(!names||names.length===0)return;
  function spawn(){
    const d=names[Math.floor(Math.random()*names.length)];
    const el=document.createElement('div');
    el.className='donor-float';
    el.textContent='♥ '+d.name;
    const vw=window.innerWidth;
    const wrap=document.getElementById('app-wrap');
    const rect=wrap.getBoundingClientRect();
    const roll=Math.random();
    let x,high=false;
    if(roll<0.35){
      x=20+Math.random()*Math.max(0,rect.left-80);
    } else if(roll<0.7){
      x=rect.right+20+Math.random()*Math.max(0,vw-rect.right-100);
    } else {
      x=rect.left+Math.random()*rect.width;
      high=true;
    }
    const startY=window.innerHeight*(0.6+Math.random()*0.35);
    const dur=high?(12+Math.random()*6).toFixed(1)+'s':(4+Math.random()*3).toFixed(1)+'s';
    const floatColors={coffee:{light:'#6b2f2f',dark:'#f0d4a0'},matcha:{light:'#3a5c3a',dark:'#a8e0a0'}};
    const color=floatColors[theme][darkMode?'dark':'light'];
    if(high){
      el.style.cssText=`left:${x}px;top:${startY}px;z-index:0;color:${color};animation:donorRiseHigh ${dur} ease-in forwards;`;
    } else {
      el.style.cssText=`left:${x}px;top:${startY}px;color:${color};--dur:${dur}`;
    }
    document.body.appendChild(el);
    el.addEventListener('animationend',()=>el.remove());
    setTimeout(spawn,1200+Math.random()*2800);
  }
  setTimeout(spawn,300+Math.random()*1500);
}

async function loadDonors(){
  if(!WORKER_URL||WORKER_URL==='YOUR_WORKER_URL'){
    startDonorFloats(DUMMY_DONORS);return;
  }
  try{
    const res=await fetch(WORKER_URL+'/donors');
    if(!res.ok){startDonorFloats(DUMMY_DONORS);return;}
    const donors=await res.json();
    startDonorFloats(donors.length>0?donors:DUMMY_DONORS);
  }catch(_){startDonorFloats(DUMMY_DONORS);}
}

loadState();
remaining=MS(modeIdx);
document.getElementById('app').className=theme==='coffee'?'theme-coffee':'theme-matcha';

// Donation name dialog
(function(){
  const params=new URLSearchParams(window.location.search);
  const sessionId=params.get('session_id');
  if(!sessionId)return;

  // Clean URL without reloading
  history.replaceState({},'',window.location.pathname);

  const overlay=document.getElementById('donationOverlay');
  const input=document.getElementById('donationNameInput');
  overlay.classList.remove('hidden');
  setTimeout(()=>input.focus(),100);

  const bannedClient=['nigger','nigga','chink','spic','kike','wetback','gook','towelhead','raghead','beaner','coon','faggot','fag','dyke','tranny','retard','nazi','kkk','1488','fuck','shit','cunt','bitch','asshole','whore','slut','kill','rape','terrorist'];
  function isClean(name){
    const n=name.toLowerCase().replace(/[^a-z0-9\s]/g,'');
    return !bannedClient.some(t=>n.includes(t));
  }

  async function submit(name){
    if(name && !isClean(name)){
      document.getElementById('donationError').style.display='block';
      return;
    }
    document.getElementById('donationError').style.display='none';
    overlay.classList.add('hidden');
    try{
      await fetch(WORKER_URL+'/submit-name',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({sessionId,name:name||''})
      });
      setTimeout(loadDonors,1000);
    }catch(_){}
  }

  document.getElementById('donationSubmit').onclick=()=>submit(input.value.trim());
  document.getElementById('donationSkip').onclick=()=>submit('');
  input.addEventListener('keydown',e=>{if(e.key==='Enter')submit(input.value.trim());});
  overlay.addEventListener('click',e=>{if(e.target===overlay)submit('');});
})();
</script>
